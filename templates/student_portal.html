<h2>Recruitment Notices</h2>

<table border="1">
<tr>
    <th>Date</th>
    <th>Title</th>
    <th>Download</th>
</tr>

{% for notice in notices %}
<tr>
    <td>{{ notice[2] }}</td>
    <td>{{ notice[1] }}</td>
    <td>
        <a href="{{ url_for('download_file', filename=notice[3]) }}">
            Download
        </a>
    </td>
</tr>
{% endfor %}
</table>
