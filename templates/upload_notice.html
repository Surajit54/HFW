{% extends "base.html" %}
{% block content %}

<h3 class="text-center mb-4">Upload Notice</h3>

<form method="POST" enctype="multipart/form-data" class="w-50 mx-auto">

<input type="text"
class="form-control mb-3"
name="memo"
placeholder="Notice Memo No"
required>

<input type="file"
class="form-control mb-3"
name="notice"
accept=".pdf"
required>

<button class="btn btn-success w-100">
Upload Notice
</button>

</form>

{% endblock %}
