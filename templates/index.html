<!DOCTYPE html>
<html>
<head>
<title>Health & Family Welfare Department</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
}

.header{
    background:#004aad;
    color:white;
    padding:15px;
}

.notice-box{
    width:70%;
    margin:auto;
    background:white;
    padding:20px;
    margin-top:20px;
}

a{
    text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<h2>Health & Family Welfare Department</h2>
<p>Government of West Bengal</p>
</div>

<div class="notice-box">
<h3>Latest Government Notices</h3>

<ul>
{% for notice in notices %}
<li>
<a href="{{ url_for('static', filename='notices/' + notice.filename) }}" target="_blank">
{{ notice.title }}
</a>
</li>
{% endfor %}
</ul>

</div>

</body>
</html>
