<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Health & Family Welfare Department | Government of West Bengal</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome (Download Icon) -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    background:#f4f6f9;
}

/* HEADER */
.gov-header{
    background:#003366;
    color:white;
    padding:15px 0;
}

.gov-title{
    font-size:22px;
    font-weight:bold;
}

/* MAIN CARD */
.main-card{
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* FOOTER */
.footer{
    background:#003366;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:40px;
}

.nav-link-custom{
    color:white;
    text-decoration:none;
    margin-left:15px;
}

.nav-link-custom:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="gov-header">
<div class="container d-flex justify-content-between align-items-center">

<div class="gov-title">
Government of West Bengal<br>
<small>Health & Family Welfare Department</small>
</div>

<div>
<a href="{{ url_for('main_home') }}" class="nav-link-custom">Home</a>
<a href="{{ url_for('home') }}" class="nav-link-custom">Notices</a>
<a href="{{ url_for('admin') }}" class="nav-link-custom">Admin</a>
</div>

</div>
</div>

<!-- CONTENT -->
<div class="container mt-4">
<div class="main-card">

{% block content %}{% endblock %}

</div>
</div>

<!-- FOOTER -->
<div class="footer">
© Health & Family Welfare Department, Government of West Bengal
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
