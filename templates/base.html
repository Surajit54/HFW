<!DOCTYPE html>
<html>
<head>

<title>Government of West Bengal</title>
<title>Health & Family Welfare Department</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

/* HEADER */
.gov-header{
    background:#003366;
    color:white;
    padding:15px 0;
}

.gov-title{
    font-size:24px;
    font-weight:bold;
}

/* MAIN CARD */
.main-card{
    background:white;
    padding:25px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* FOOTER */
.footer{
    background:#003366;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:40px;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="gov-header">
<div class="container d-flex justify-content-between">

<div class="gov-title">
Government Notice Portal
</div>

<div>
<a href="{{ url_for('home') }}" class="text-white me-3">Home</a>
<a href="{{ url_for('admin') }}" class="text-white">Admin</a>
</div>

</div>
</div>

<!-- CONTENT -->
<div class="container mt-4">
<div class="main-card">

{% block content %}{% endblock %}

</div>
</div>

<!-- FOOTER -->
<div class="footer">
© Government Notice Portal
</div>

</body>
</html>
