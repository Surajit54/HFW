<!DOCTYPE html>
<html>
<head>
<title>Health Department</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f4f6f9;
    margin:0;
}

/* ===== GOVT HEADER ===== */
.gov-header{
    background:#0b3d6d;

    padding:15px;
}

    height:70px;
}

.title-main{
    font-size:26px;

<div class="subtitle">Department of Health & Family Welfare</div>
</div>

</div>
</div>

<!-- ================= MAIN ================= -->
<div class="container portal-box">

<h4 class="mb-4">Government Portal</h4>
