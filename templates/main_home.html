<!DOCTYPE html>
<html>
<head>
<title>Health Department</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
margin:0;
font-family:Arial;
}

/* ===== GOVT HEADER ===== */

.gov-header{
background:#0b3d6d;
color:white;
padding:15px;
}

.logo{
height:70px;
}

.title-main{
font-size:26px;
font-weight:bold;
}

.subtitle{
font-size:18px;
}

/* ===== NAVBAR ===== */

.navbar-custom{
background:#0d5cb6;
}

.navbar-custom a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:500;
}

/* ===== BANNER ===== */

.banner{
background:linear-gradient(to right,#3fa9f5,#63c3e6);
height:320px;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:36px;
font-weight:bold;
}

/* ===== SERVICE CARDS ===== */

.services{
margin-top:-60px;
}

.card{
border:none;
border-radius:12px;
text-align:center;
padding:25px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.card:hover{
transform:translateY(-5px);
}

.icon{
font-size:40px;
}

/* ===== PORTAL BUTTONS ===== */

.portal-box{
margin-top:60px;
text-align:center;
}

.portal-btn{
padding:15px 35px;
margin:10px;
font-size:18px;
}

/* ===== FOOTER ===== */

.footer{
margin-top:80px;
background:#0b3d6d;
color:white;
text-align:center;
padding:10px;
}

</style>
</head>

<body>

<!-- ================= HEADER ================= -->

<div class="gov-header">
<div class="container d-flex align-items-center">

<img src="{{ url_for('static', filename='images/wb_logo.png') }}" class="logo me-3">

<div>
<div class="title-main">Government of West Bengal</div>
<div class="subtitle">Department of Health & Family Welfare</div>
</div>

</div>
</div>

<!-- ================= NAVBAR ================= -->

<div class="navbar-custom p-2">
<div class="container">

<a href="/">Home</a>
<a href="/notices">Notices</a>
<a href="#">About Us</a>
<a href="#">Contact</a>
<a href="#">RTI</a>

</div>
</div>

<!-- ================= BANNER ================= -->

<div class="banner">
Government Recruitment Portal
</div>

<!-- ================= SERVICE CARDS ================= -->

<div class="container services">

<div class="row g-4">

<div class="col-md-3">
<div class="card">
<div class="icon">🔍</div>
<h5>Online Application</h5>
</div>
</div>

<div class="col-md-3">
<div class="card">
<div class="icon">📄</div>
<h5><a href="/recruit">Recruitment</a></h5>
</div>
</div>

<div class="col-md-3">
<div class="card">
<div class="icon">📢</div>
<h5><a href="/notices">Notices</a></h5>
</div>
</div>

<div class="col-md-3">
<div class="card">
<div class="icon">🧑‍💼</div>
<h5><a href="/admin">Admin Login</a></h5>
</div>
</div>

</div>

</div>

<!-- ================= PORTAL BUTTONS ================= -->

<div class="container portal-box">

<a href="/notices" class="btn btn-primary portal-btn">
📢 Notice Portal
</a>

<a href="/admin" class="btn btn-dark portal-btn">
🧑‍💼 Admin Login
</a>

</div>

<!-- ================= FOOTER ================= -->

<div class="footer">
© Health & Family Welfare Department
</div>

</body>
</html>
