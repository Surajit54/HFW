{% extends "base.html" %}

{% block content %}

<h4>Upload Recruitment</h4>

<form method="POST" enctype="multipart/form-data">

<input type="text" name="title" placeholder="Post Name" class="form-control mb-2">

<textarea name="details" placeholder="Details" class="form-control mb-2"></textarea>

<input type="date" name="start_date" class="form-control mb-2">

<input type="date" name="end_date" class="form-control mb-2">

<input type="file" name="pdf" class="form-control mb-3">

<button class="btn btn-success">
Upload Recruitment
</button>

</form>

{% endblock %}
