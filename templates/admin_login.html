{% extends "base.html" %}
{% block content %}

<div class="container text-center mt-5">

    <h2>Admin Login</h2>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form action="{{ url_for('admin') }}" method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required
               class="form-control w-25 mx-auto"><br>

        <input type="password"
               name="password"
               placeholder="Password"
               required
               class="form-control w-25 mx-auto"><br>

        <button type="submit" class="btn btn-primary">
            Login
        </button>

    </form>

</div>

{% endblock %}
