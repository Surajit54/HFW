{% extends "base.html" %}
{% block content %}

<h3 class="text-center mb-4">Admin Login</h3>

<div class="card shadow-sm mx-auto" style="max-width:400px">

<div class="card-body">

<form method="POST">

<div class="mb-3">
<label>Username</label>
<input class="form-control"
name="username"
required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password"
class="form-control"
name="password"
required>
</div>

<button class="btn btn-primary w-100">
Login
</button>

</form>

</div>
</div>

{% endblock %}
